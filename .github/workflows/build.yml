name: Build Android APK and AAB

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install Cordova
      run: npm install -g cordova

    - name: Install project dependencies
      run: npm install

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
        restore-keys: gradle-${{ runner.os }}

    - name: Install Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare Cordova
      run: cordova prepare

    - name: Clean Android build
      run: cordova clean android

    # Build APK (installable)
    - name: Build Debug APK
      run: cordova build android

    # Build AAB (Play Store bundle)
    - name: Build Release Bundle
      run: cordova build android --release

    - name: Show build outputs
      run: ls -R platforms/android/app/build/outputs

    - name: Create GitHub Release and Upload Files
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: Build ${{ github.run_number }}
        files: |
          platforms/android/app/build/outputs/apk/debug/*.apk
          platforms/android/app/build/outputs/bundle/release/*.aab
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}